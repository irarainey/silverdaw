# electron-builder packaging configuration for Silverdaw.
#
# Produces a Windows NSIS installer (`Silverdaw-Setup-<version>.exe`) and an
# unpacked app directory under `<repo>/dist/win-unpacked/` for local smoke
# tests. The JUCE backend exe + the icon set are shipped as `extraResources`
# so they land in `<install>/resources/` next to the asar archive — see
# `startBackend()` in `src/main/index.ts` which resolves them from
# `process.resourcesPath`.

appId: com.silverdaw.app
productName: Silverdaw
copyright: Copyright © 2026 Ira Rainey

directories:
  buildResources: resources
  # Write installer + win-unpacked into the repo-root `dist/` directory
  # (gitignored except for `.gitkeep`). Keeps `frontend/` clean of large
  # binary outputs.
  output: ../dist

# Asar pack of the Electron app itself. Renderer + main + preload bundles
# all live under `out/` after `electron-vite build`. The `node_modules`
# entry pulls in production dependencies (music-metadata + its transitive
# tree); electron-builder automatically filters dev-only packages using
# package.json `dependencies` vs `devDependencies`, so the asar stays
# lean. Without an explicit `node_modules` entry the main bundle's
# `require('music-metadata')` (and friends like `ieee754` underneath it)
# fail to resolve in the packaged app — `externalizeDepsPlugin()` in
# electron-vite keeps those imports as runtime requires.
files:
  - out/**
  - resources/icons/**
  - node_modules/**
  - package.json

# The JUCE backend lives outside the renderer bundle. Build it Release first
# (see scripts/Build-Release.ps1, which uses its own `backend/build-release/`
# directory so the Debug cache that VS Code uses isn't clobbered) then
# electron-builder copies the artefact into `process.resourcesPath/backend/`
# for the packaged app to spawn.
extraResources:
  - from: ../backend/build-release/SilverdawBackend_artefacts/Release
    to: backend
    filter:
      - SilverdawBackend.exe
      # onnxruntime.dll is copied next to SilverdawBackend.exe by the CMake
      # POST_BUILD step (see SILVERDAW_ENABLE_STEM_SEPARATION in
      # backend/CMakeLists.txt). It is MIT-licensed, so it ships inside the
      # installer to power stem separation with no extra user download. If
      # stem separation is disabled at build time the DLL is simply absent and
      # this filter entry matches nothing.
      - onnxruntime.dll
      # DirectML.dll is copied next to SilverdawBackend.exe by the CMake
      # POST_BUILD step only when the GPU build is enabled
      # (SILVERDAW_ONNXRUNTIME_DIRECTML). When that option is off the file is
      # absent and this filter entry matches nothing.
      - DirectML.dll
      # lame.exe is copied next to SilverdawBackend.exe by the CMake POST_BUILD
      # step (see `SILVERDAW_LAME_EXE` in backend/CMakeLists.txt) when the
      # binary is dropped into `backend/third_party/lame/`. When present it
      # ships next to the backend so `findLameExecutable()` resolves it via
      # `process.resourcesPath/backend/lame.exe`. When absent, MP3 export
      # returns a friendly "encoder not bundled" error at runtime and the
      # other formats (WAV/FLAC) keep working.
      - lame.exe
  # Ship the AGPL text + third-party notices inside the install so users have
  # them locally (satisfies AGPL §4 / MIT / BSD attribution obligations).
  - from: ../LICENSE
    to: LICENSE
  - from: ../THIRD_PARTY_LICENSES.md
    to: THIRD_PARTY_LICENSES.md

# Register `.silverdaw` as a first-class file type so double-clicking a
# project in Explorer launches (or signals an already-running) Silverdaw
# and opens it. The custom document icon (white page + folded corner +
# logo) is generated by `scripts/Build-InstallerArt.py`.
#
# electron-builder writes the registry entries during installation
# (HKCU\Software\Classes\.silverdaw + ...\com.silverdaw.app.silverdaw),
# and unregisters them on uninstall. On Windows the file path comes in
# via `process.argv[1]`; the main process forwards it to the renderer
# once the bridge is ready — see the single-instance lock block in
# `src/main/index.ts`.
fileAssociations:
  - ext: silverdaw
    name: Silverdaw Project
    description: Silverdaw Project File
    icon: resources/icons/silverdaw-file.ico
    role: Editor
    rank: Owner

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
  # `publisherName` moved into `signtoolOptions` in electron-builder
  # 26.x. The string is written into the uninstaller registry entry's
  # `Publisher` value (visible in Settings → Apps → installed apps and
  # in the SmartScreen prompt). For NSIS we don't actually invoke
  # signtool — the surrounding `signtoolOptions` object is still the
  # canonical place to declare publisher metadata.
  signtoolOptions:
    publisherName: Ira Rainey

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Silverdaw
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerHeaderIcon: resources/icons/icon.ico
  # `installerHeader.bmp` (150x57), `installerSidebar.bmp` and
  # `uninstallerSidebar.bmp` (164x314 each) are picked up automatically
  # by electron-builder from `directories.buildResources` (= `resources/`).
  # They're regenerated by `scripts/Build-InstallerArt.py`.
  license: ../LICENSE
