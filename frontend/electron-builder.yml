# electron-builder packaging configuration for Silverdaw.
#
# Produces a Windows MSIX/AppX package (`Silverdaw-<version>.appx`), a portable
# zip (`Silverdaw-<version>.zip` â€” extract and run, no install/cert), plus an
# unpacked app directory under `<repo>/dist/win-unpacked/` for local smoke
# tests. The JUCE backend exe + the icon set are shipped as `extraResources`
# so they land in `<install>/resources/` next to the asar archive â€” see
# `startBackend()` in `src/main/index.ts` which resolves them from
# `process.resourcesPath`.
#
# MSIX replaces the previous NSIS installer: the NSIS `System.dll` plugin was
# crashing intermittently at launch (0xC0000005) when Windows Defender scanned
# the freshly-extracted plugin, and MSIX has no such stub. MSIX is also the
# single artefact that supports both direct sideloading (self-signed, see
# `scripts/Build-Release.ps1`) and later Microsoft Store submission.

appId: com.silverdaw.app
productName: Silverdaw
copyright: Copyright Â© 2026 Ira Rainey

directories:
  buildResources: resources
  # Write installer + win-unpacked into the repo-root `dist/` directory
  # (gitignored except for `.gitkeep`). Keeps `frontend/` clean of large
  # binary outputs.
  output: ../dist

# Asar pack of the Electron app itself. Renderer + main + preload bundles
# all live under `out/` after `electron-vite build`. The `node_modules`
# entry pulls in production dependencies (music-metadata + its transitive
# tree); electron-builder automatically filters dev-only packages using
# package.json `dependencies` vs `devDependencies`, so the asar stays
# lean. Without an explicit `node_modules` entry the main bundle's
# `require('music-metadata')` (and friends like `ieee754` underneath it)
# fail to resolve in the packaged app â€” `externalizeDepsPlugin()` in
# electron-vite keeps those imports as runtime requires.
files:
  - out/**
  - resources/icons/**
  - node_modules/**
  - package.json

# The JUCE backend lives outside the renderer bundle. Build it Release first
# (see scripts/Build-Release.ps1, which uses its own `backend/build-release/`
# directory so the Debug cache that VS Code uses isn't clobbered) then
# electron-builder copies the artefact into `process.resourcesPath/backend/`
# for the packaged app to spawn.
extraResources:
  - from: ../backend/build-release/SilverdawBackend_artefacts/Release
    to: backend
    filter:
      - SilverdawBackend.exe
      - midi-mappings/**
      # onnxruntime.dll is copied next to SilverdawBackend.exe by the CMake
      # POST_BUILD step (see SILVERDAW_ENABLE_STEM_SEPARATION in
      # backend/CMakeLists.txt). It is MIT-licensed, so it ships inside the
      # installer to power stem separation with no extra user download. If
      # stem separation is disabled at build time the DLL is simply absent and
      # this filter entry matches nothing.
      - onnxruntime.dll
      # DirectML.dll is copied next to SilverdawBackend.exe by the CMake
      # POST_BUILD step only when the GPU build is enabled
      # (SILVERDAW_ONNXRUNTIME_DIRECTML). When that option is off the file is
      # absent and this filter entry matches nothing.
      - DirectML.dll
      # lame.exe is copied next to SilverdawBackend.exe by the CMake POST_BUILD
      # step (see `SILVERDAW_LAME_EXE` in backend/CMakeLists.txt) when the
      # binary is dropped into `backend/third_party/lame/`. When present it
      # ships next to the backend so `findLameExecutable()` resolves it via
      # `process.resourcesPath/backend/lame.exe`. When absent, MP3 export
      # returns a friendly "encoder not bundled" error at runtime and the
      # other formats (WAV/FLAC) keep working.
      - lame.exe
      # onnxruntime.dll (Microsoft-built) dynamically links the VC++ runtime, which
      # a clean machine may lack and MSIX does not auto-provide. The backend copies
      # these app-local next to SilverdawBackend.exe (see backend/CMakeLists.txt) so
      # the loader resolves them before main(); ship them inside the package too.
      - msvcp140.dll
      - msvcp140_1.dll
      - vcruntime140.dll
      - vcruntime140_1.dll
  # Ship the AGPL text + third-party notices inside the install so users have
  # them locally (satisfies AGPL Â§4 / MIT / BSD attribution obligations).
  - from: ../LICENSE
    to: LICENSE
  - from: ../THIRD_PARTY_LICENSES.md
    to: THIRD_PARTY_LICENSES.md

# Register `.silverdaw` as a first-class file type so double-clicking a
# project in Explorer launches (or signals an already-running) Silverdaw
# and opens it. On Windows the opened file path arrives via `process.argv`;
# the main process forwards it to the renderer once the bridge is ready â€” see
# the single-instance lock block in `src/main/index.ts`.
#
# The association is declared for MSIX/AppX via `appx.customExtensionsPath`
# (resources/appx-extensions.xml) rather than electron-builder's top-level
# `fileAssociations`. electron-builder's built-in translation emits only a
# minimal `windows.fileTypeAssociation` (Name + SupportedFileTypes) with no
# icon or friendly type name; the custom extensions XML adds a DisplayName,
# InfoTip, and the document `<uap:Logo>` so `.silverdaw` files show the custom
# icon and "Silverdaw Project" type label in File Explorer. Both cannot be used
# together â€” they would register `.silverdaw` twice â€” so the custom XML is the
# single source of truth. (Windows still won't let any installer force itself
# as the *default* handler; a brand-new extension opens with the sole
# registered handler, at most after a one-time "How do you want to open" prompt.)

win:
  target:
    - target: appx
      arch:
        - x64
    # Portable distribution: a plain zip of the unpacked app. Users extract it
    # anywhere writable and run Silverdaw.exe directly â€” no certificate trust
    # and no install step (worst case a one-time, click-through SmartScreen
    # prompt from Mark-of-the-Web). Trade-off vs the MSIX: no Start-menu entry,
    # no `.silverdaw` association, no Apps & features uninstall, no auto-update.
    # The exes inside are already signtool-signed (the zip itself is not
    # signable). Produces dist/Silverdaw-<version>.zip.
    - target: zip
      arch:
        - x64
  icon: resources/icons/icon.ico
  artifactName: ${productName}-${version}.${ext}
  # Sign the package (and the executables it wraps) with a self-signed
  # code-signing certificate whose Subject is `CN=Silverdaw`, selected from
  # the local Windows certificate store by subject name. `signtool` reads the
  # matching cert (and its private key) straight from `Cert:\CurrentUser\My`,
  # so NO private key material (.pfx) is ever written into the repo tree.
  #
  # `scripts/Build-Release.ps1` creates the cert on first run if it is
  # missing and exports only the PUBLIC `.cer` (for users to trust) into the
  # gitignored `dist/`. A build on a machine without that cert will fail at
  # the signing step â€” that is expected; run Build-Release.ps1 to provision it.
  #
  # Store submission uses a different identity (Microsoft re-signs), so a
  # Store build overrides this â€” see the Store-readiness review.
  signtoolOptions:
    certificateSubjectName: Silverdaw
    # SHA256 only. electron-builder's default also does a legacy SHA1 pass,
    # which the modern Windows SDK signtool rejects (it refuses to sign
    # without an explicit /fd on that pass). SHA256-only is the correct,
    # secure choice and matches AppX signing requirements.
    signingHashAlgorithms:
      - sha256

# MSIX/AppX package metadata. `publisher` MUST exactly match the Subject of
# the signing certificate (`CN=Silverdaw`) or Windows refuses to install the
# package. `identityName`/`publisher`/`publisherDisplayName` are the
# self-signed sideloading values; when publishing to the Microsoft Store,
# replace them with the identity Partner Center assigns to the reserved app.
appx:
  identityName: Silverdaw
  publisher: CN=Silverdaw
  publisherDisplayName: Silverdaw
  displayName: Silverdaw
  applicationId: Silverdaw
  # Opaque plate matching the Windows 11 light App Installer dialog surface
  # (#F3F3F3). A transparent background lets the shell paint the system accent
  # behind the logo; an opaque plate in the dialog's own colour blends in.
  # Keep in sync with APPX_TILE_BG in scripts/Build-InstallerArt.py.
  backgroundColor: "#f3f3f3"
  languages:
    - en-US
  # Desktop Windows 10 and 11. TargetDeviceFamily is `Windows.Desktop`
  # (electron-builder's manifest template â€” never `Windows.Universal`, so this
  # is a desktop Win32 app, not a PWA/UWP). MinVersion is the Windows 10 1809
  # baseline (the common Store minimum); nothing in the app requires Windows 11
  # (Electron 42/Chromium, JUCE, runFullTrust and the DirectML/onnxruntime
  # redistributables all support Windows 10 1809+).
  minVersion: "10.0.17763.0"
  maxVersionTested: "10.0.22621.0"
  # Only the full-trust capability â€” the app requests no device/location/media
  # capabilities. Renderer permission requests are additionally denied at
  # runtime (see src/main/sessionSecurity.ts).
  capabilities:
    - runFullTrust
  # Inject a richer `.silverdaw` fileTypeAssociation (friendly type name,
  # tooltip, and the document icon) into the generated AppxManifest's
  # <Extensions>. Path is relative to the app dir (frontend/). See the file
  # association note above and resources/appx-extensions.xml. The referenced
  # <uap:Logo> (assets\silverdaw-file.png) is produced by
  # scripts/Build-InstallerArt.py into resources/appx/.
  customExtensionsPath: resources/appx-extensions.xml
