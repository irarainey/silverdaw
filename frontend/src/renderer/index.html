<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy:
        - 'unsafe-inline' on style-src is required by Tailwind v4, which
          injects JIT-generated rules as inline <style> blocks at runtime.
          The residual XSS risk is bounded by sandbox + contextIsolation +
          the absence of any remote content (default-src 'self', and no
          remote script/style is ever loaded). Revisit if/when Tailwind
          supports a nonced-style mode in this version.
        - img-src allows blob: for decoded cover-art Blobs returned from
          the music-metadata parser, and data: for the title-bar icon
          which Vite inlines as a base64 data URI in production builds
          because the source PNG is below its default 4 KB inline limit.
        - connect-src whitelists ws://127.0.0.1:* / ws://localhost:* only
          for the loopback JUCE bridge.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' ws://127.0.0.1:* ws://localhost:*"
    />
    <title>Silverdaw</title>
    <style>
      /*
        Static splash: visible from the first paint of `index.html` and
        kept on screen until `createApp(App).mount('#app')` replaces the
        container's children with the Vue tree. The Vue-side
        `StartupScreen` is styled to match exactly, so the handoff
        is invisible to the user — they see one consistent loading
        screen from `BrowserWindow` open through the bridge handshake.
      */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #18181b; /* zinc-900 — matches StartupScreen + title-bar overlay */
        color: #e4e4e7;      /* zinc-200 */
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      /*
        Window controls. Mirror the Vue `StartupScreen` /  title-bar
        cluster (minimise, maximise / restore, close — each 44x36,
        zinc-400 → zinc-800 on hover; close → red-600) so the hand-off
        from this static splash to the Vue tree shows no visual jump.
        Wired to `window.silverdaw.*` from `main.ts` (CSP forbids inline
        handlers). The full-width strip is draggable so the window can be
        moved before the Vue shell mounts.
      */
      .splash-titlebar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        display: flex;
        justify-content: flex-end;
        height: 36px;  /* h-9 */
        -webkit-app-region: drag;
      }
      .splash-controls {
        display: flex;
        height: 100%;
        -webkit-app-region: no-drag;
      }
      .splash-ctl {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;   /* w-11 */
        height: 100%;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: #a1a1aa; /* zinc-400 */
        cursor: pointer;
      }
      .splash-ctl:hover {
        background: #27272a; /* zinc-800 */
        color: #f4f4f5;      /* zinc-100 */
      }
      .splash-ctl:focus {
        outline: none;
      }
      .splash-ctl svg {
        width: 14px;
        height: 14px;
      }
      .splash-close:hover {
        background: #dc2626; /* red-600 */
        color: #ffffff;
      }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        height: 228px;
      }
      .splash img {
        width: 128px;
        height: 128px;
        flex-shrink: 0;
        user-select: none;
        -webkit-user-drag: none;
      }
      .splash-spinner {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border-radius: 50%;
        border: 2px solid #3f3f46;     /* zinc-700 */
        border-top-color: #f4f4f5;     /* zinc-100 */
        /* 1s matches the Vue side's Tailwind `animate-spin`, so the spinner
           speed doesn't change when the static splash hands off to the Vue
           StartupScreen. */
        animation: splash-spin 1s linear infinite;
      }
      .splash-text {
        margin: 0;
        height: 20px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        font-size: 13px;
        line-height: 20px;
        font-weight: 500;
        color: #e4e4e7;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!--
        Replaced by Vue's render output when `createApp(App).mount('#app')`
        runs. Until then, this static markup gives the user something
        meaningful to look at instead of the empty Electron canvas
        between window-open and the first React/Vue paint.
      -->
      <div class="splash">
        <div class="splash-titlebar">
          <div class="splash-controls">
            <button
              id="splash-minimize"
              class="splash-ctl"
              type="button"
              aria-label="Minimise"
              title="Minimise"
            >
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path
                  d="M3 8h10"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  fill="none"
                />
              </svg>
            </button>
            <button
              id="splash-maximize"
              class="splash-ctl"
              type="button"
              aria-label="Maximise or restore"
              title="Maximise / Restore"
            >
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <rect
                  x="4"
                  y="4"
                  width="8"
                  height="8"
                  rx="0.75"
                  stroke="currentColor"
                  stroke-width="1.4"
                />
              </svg>
            </button>
            <button
              id="splash-close"
              class="splash-ctl splash-close"
              type="button"
              aria-label="Close Silverdaw"
              title="Close"
            >
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path
                  d="M4.25 4.25l7.5 7.5M11.75 4.25l-7.5 7.5"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  fill="none"
                />
              </svg>
            </button>
          </div>
        </div>
        <div class="splash-inner">
          <img src="/256x256.png" alt="" aria-hidden="true" />
          <div class="splash-spinner" aria-hidden="true"></div>
          <div class="splash-text">Loading Silverdaw…</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
